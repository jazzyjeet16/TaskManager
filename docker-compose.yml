# docker-compose.yml  (optional — run the whole stack with one command)
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       taskmanager
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: yourpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT:           5000
      NODE_ENV:       production
      DB_HOST:        postgres
      DB_PORT:        5432
      DB_NAME:        taskmanager
      DB_USER:        postgres
      DB_PASSWORD:    yourpassword
      JWT_SECRET:     change_me_in_production
      JWT_EXPIRES_IN: 7d
      CLIENT_URL:     http://localhost:5173
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  pgdata:
